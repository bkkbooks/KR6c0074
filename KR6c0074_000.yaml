front:
  text: 金剛經會解了義自敘豫於戊辰燕邸考授別駕時誦起金剛經閲今三十五載口為誦而心無解欲以不解解之初非此可解彼不可解又非有可解有不可解竊嘆義味何如是深奧究竟無淺如何有深無顯如何有奧大而世界此也細而微塵此也明明可舉似明明無可舉似繁而生類此也約而四相此也實實有係屬實實無所係屬法可說而法原無法併說亦無說物可度而物無其物併度亦非度上而授記無授記下而受持無受持中而演說四句偈無從而演說諸相不立歸於無我造作不生泯於無為總之無可住之法便無可住之心有住而無住之心即是不降而降之法故護念非不諄切而去來坐臥先無定付囑非不叮嚀而夢幻泡影誰是真豫遍搜諸解俱不過會文挈義尋章摘句爾已於其中煩者汰之訛者訂之晦者醒之倒者整之前後呼應者暢其詞虗實轉變者通其意謂直遡靈山會上覿面吐露覿面稟承世尊不說說須菩提不聞聞阿難結集於儼然未散時而會取當日情境余則何敢若以堅利喻金剛余則曰堅莫堅於此心利莫利於此信法之心心光即是佛光人人有現成般若證佛不如證心在在有捷經六波羅蜜至於非名是名正第一義難形容處如云日出西方夜落東桃華雪白李華紅何獨不然時順治辛丑季春徐昌治覲周父書於大業堂中
