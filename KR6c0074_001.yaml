body:
  text: 三藏法師鳩摩羅什原譯兄徐從治肩虞父徐光治孟𤏩父同訂無依道人徐昌治覲周父纂男徐升貞徐乾貞徐拱樞孫徐貞徐儲元同校金剛般若波羅蜜經金剛二字顯佛一片金剛心能斷疑也以世間常情不能知佛及其日用行事件件不與人同未免見而生疑即弟子中亦疑佛所說法難信難解今幸空生窺見世尊一班忽生讚嘆故世尊因其疑而破之乃披自己一片金剛心令諸聞者群疑頓斷抑且能斷衆生煩惱故彌勒二十七疑斷發無剩義佛說大般若經六百卷一十六會此經第五百七十七卷給孤獨園第九會金剛乃護法力士所執之瑤極堅極利無物不破以堅喻般若體以利喻般若用般若云慧乃不動智光虗明神照即是人人共有的本覺真性波羅蜜云到彼岸見性得度即是彼岸未得度者即是此岸其實彼岸乃固有之地即此心極盡處也衆生業識苦海茫茫然海必從岸注猶煩惱原以慧生轉無邊煩惱為無邊智慧方到彼岸是到原無到迷者自不悟耳般若云智慧破愚癡故智慧與愚癡俱無定體悟此心即愚癡是智慧迷此心即智慧是愚癡經徑也到彼岸之徑路也經者能貫能攝貫穿所應說義攝持所化衆生佛滅二千餘年正法不至散失經之貫穿也衆生流浪六趣遵教咸歸正趣經之攝持也釋經分三分初序分二正宗分三流通分法會因由分第一法會因由指路途修心道者滿江湖欲行千里從初步踏著家山是丈夫如是我聞一時佛在舍衛國祇樹給孤獨園與大比丘衆千二百五十人俱爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐此是佛住世說法儀式如是指經我聞阿難自稱我從佛聞也一時者師資會合之時佛者覺也自覺覺他也舍衛國波斯匿王所居祇陀太子之名華言戰勝因王戰勝鄰國而生故名祇樹太子所栽太子捨此園與須達長者常給孤獨貧人內立精舍請佛住此說法所共聞者有大比丘等此名乞士乞法於佛乞食於人也大者人所敬仰佛說妙諦非大比丘不能頓悟也衆者會聚和合千二百五十人者佛成道後先度憍陳如五人次度迦葉等千人後度舍利佛目犍連等二百五十人悉來園中聽法俱者主衆咸在則此經之得聞自佛更無疑矣爾時者將欲說經之時世尊乃十號之一世出世間福慧具足也佛以日中食食時是將食之時著衣即金色僧伽梨二十五條衣也鉢即應量器園在城外自外入內大城處廣人多也行乞折自傲破他慳次第不分貧富也原歸園中飯食置衣淨鉢洗足不令塵垢也趺伽打坐不令疲倦也大聖行徑與凡人無異其間多從容自在體態三寶不具法會不成如是法也佛在佛也大比丘僧也凡欲流通佛法全仗三寶之力乞食威儀戒也敷座而坐定也自世尊行之則皆慧也戒定慧乃三寶無漏學善現起請分第二善現起請問來由進道何須向外求佛本是心心是佛靈山盡在汝心頭一部金剛般若全從空生一問發起時長老須菩提在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊如來善護念諸菩薩善付囑諸菩薩世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛言善哉善哉須菩提如汝所說如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝說善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心唯然世尊願樂欲聞般若真空非解空者不能與佛互相激揚須菩提解空第一華言空生亦名善現如來乞食趺坐時雖則隨機晏座無說無聞却被須菩提忽然覷見這個時節在大衆中忍悛不禁即從座起欲請大法先肅敬儀西方行禮則偏袒右肩右膝尚右也合掌一心奉持也大衆只見如來著衣乞飯與衆一般空生獨見得有與人不同處真天上天下獨尊者故開口說個希有世尊希有有三義第一能捨金輪王位第二身長丈六紫金磨容三十二相八十種好第三性能含吐八萬四千法三身圓備福慧兩足其護念付囑而日善乃密密方便而將就之正是希有之事也如彌勒云巧護義應知加彼身同行真自利利他也又云不退得未得是名善付囑阿云無耨多羅云上三云正藐云等菩提云覺圓明普照故云無上正等正覺謂正智覺真遍智覺俗皆不偏邪發此心者住於何法降何等心若謂有真實可住虗妄心可降便非男女發心求證佛果工夫工夫只在修心修心只期安定佛因其問切身心深讚其是而答以不住一法是真住降伏一切取相之心是真降住降無二法不住一切法即降伏取相之心降伏取相之心即不住一切法總一阿耨多羅三藐三菩提耳如是者要得此心自住自降政所謂法無可得亦無可說總包含於如是兩字空生才聞此語直下領會應個唯然願樂欲聞菩提有五種一發心菩提即十信是二伏心菩提即三賢是三明心菩提初地至十地是四出到菩提八九十地是五無上菩提即如來地是二祖侍達磨乞安心法磨云將心來與汝安祖云覔心了不可得磨云與汝安心竟然在祖師門下一言便了所以為宗今世尊說了許多安心之法婆心漏逗所以為教到底只是個覔心了不可得故四祖以前皆以楞伽印心至黃梅六祖皆以金剛印心故此經非文字相全在離言之妙其經中凡言於汝意云何皆反徵其疑也降伏乃離散亂輕慢顛倒而生聞思修三慧大乘正宗分第三大乘正宗本不多道實無言意若何莫道無言皆是道依然還在葛藤窩此章是答降伏而安住即在其中佛告須菩提諸菩薩摩訶薩應如是降伏其心所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想非無想我皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩此專答須菩提所問降伏其心一句謂此心不能降伏良由生類之繁而四相之難忘耳所有一切衆生之類雖為無量無數無邊不出胎卵濕化四生四生之內不出身心二法論身不過有色無色論心不過有想無想前念清淨後念清淨名為菩薩念念不退雖在塵勞心常清淨名摩訶薩如來指示三界九地衆生各有涅槃妙心令自悟入無餘無餘者無習氣煩惱也涅槃者圓滿清淨貪求不生度者渡生死大海也佛心平等普願一切衆生同入圓滿清淨同渡生死大海祗為凡夫不見自本心執著諸相不達無為之理是名衆生若離此病實無衆生得滅度者卵胎濕化是情情盡矣猶有色色盡矣猶有想想盡矣猶有非非想便描出個不得寂滅不得無餘的樣子菩薩滅度即是將此種種差別一眼看破全無自性徹底皆空全衆生是涅槃全涅槃是衆生全衆生無衆生全涅槃無涅槃所以然者正以無四相故耳人我愛憎四病相因而又皆生於我相云我能滅度衆生此我相也而我能滅度必有為我所度之人非人相乎如此較量分別其間起一憎心而不欲度之云這個是衆生此衆生相也起一愛心而欲度之云願汝百歲此壽者相也有此四相顛倒妄想此心安得降伏所謂不正等也非菩薩便不是正覺降伏在住修中住中降伏即實度者修中降伏即無住布施便是離相無餘有二義一生行業脫盡無餘一切德業攝盡無餘妙行無住分第四妙行無住印三千印破三千見性天鵲噪鴉鳴全體現得方圓處且方圓上章降伏之法已說盡即安住之法亦已說盡但滅度二字拆不開滅正在度處滅度正在滅處度六度正是涅槃實際處復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施須菩提菩薩應如是布施不住於相何以故若菩薩不住相布施其福德不可思量須菩提於意云何東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量須菩提菩薩但應如所教住此復答須菩提所問云何應住一句謂此心未能安住良由作福祈報未免著念耳惟菩薩於無所住法行於布施布施有三一財施一無畏施一法施不住聲色香味觸法施此三種不住不惟無其相抑且無其心矣菩薩應如是布施者三輪皆空無相可住其福德遂如十方虗空不可思量菩薩無上正等正覺之心應如所教住矣總之一無所住於心而心無弗住矣世界中大者莫過虗空一切性中大者莫過佛性此虗空中本無東西南北若見東西南北亦是住相佛性本無我人衆生壽者若有此四相可見即是衆生性不名佛性所謂住相布施也應者唯也唯如上所說之教住無相布施即是菩薩彌勒偈云檀義攝於六資生無畏法此中一二三是名修行住無所住不惟布施一法乃至六波羅蜜四無量心菩提涅槃俱無所住無住而住如十方虗空也如理實見分第五如理實見本無差聖凡同印一枝華五葉聯芳千古盛至今天下有虗誇上文說個不住相尚未說出所以不當住相之故得無量福德只說得無相的福報是應化邊事不曾說得無相的源頭至說凡所有相皆是虗妄虗妄之法豈可住著須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來何以故如來所說身相即非身相佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來此段辨驗前說不住相布施佛具三十二相尚然非相況布施而可著相乎總之無相妙行不在佛應化之相而當見法身真體世尊直告不可以相見如來以如來所說之身即法身也故云非身非相者乃如來無為之覺體也既曰無為如何可見蓋衆生只因妄念起諸種種分別所以見有諸妄之相不見非相之真相若妄念不起分別頓亡則真實覺體自爾現前所以云即見如來也正信希有分第六正信希有個中知呈機利物在當時和盤托出從君用信手拈來早是遲如來恐人看衆生太輕看言說太重所以佛答上半截是引衆生入淨信門下半截是表淨信出言說外可見佛之應身固是相佛所說之法亦是相必并法非法之相俱空而後可以名淨信也須菩提白佛言世尊頗有衆生得聞如是言說章句生實信不佛告須菩提莫作是說如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸衆生得如是無量福德何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相何以故是諸衆生若心取相即為著我人衆生壽者若取法相即著我人衆生壽者何以故若取非法相則著我人衆生壽者是故不應取法不應取非法以是義故如來常說汝等比丘知我說法如筏喻者法尚應捨何況非法此正答住修降問也無住行施因深也無相見佛果深也言說章句即指前無相因果之說持戒修福不於一佛二佛三四五佛而種善根直從無量千萬佛所而種根者此等大根衆生即一念信心所得福已無量矣不但無四相即一切有無諸相悉已皆空故云無法相亦無非法相在佛所種善則緣勝在無量佛所種善根則根深緣勝則諸佛護念根深則般若熏心此淨信人直下自信自心性光陡露諸相消亡法相既無則空相便現夫無四相則人空無法相則法空無非法相則空亦空以清淨無相心受清淨無相福如渡海用筏借法明心心悟便當捨法夫法是度生之具尚不應戀況非法元無體相可據豈可取著乎無量千萬佛即是本覺一念生淨信即是始覺淨信無所得信也歷事善友故能積集信因集因於多佛所緣勝也種諸善根久伏三毒因勝也此不滯相不執見之法亦欲令捨況滯相執見之非法而可不捨乎無得無說分第七無得無說本無傳默然良久別尋玄商量據座無非咎勘破分明出自然承上章不可取法非法而明無得無說之真法須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所說法耶須菩提言如我解佛所說義無有定法名阿耨多羅三藐三菩提亦無有定法如來可說何以故如來所說法皆不可取不可說非法非非法所以者何一切賢聖皆以無為法而有差別上言法非法皆不可取則似乎無可得無可說矣無上菩提超情離見清淨本然隨衆生心應所知量衆生根器無定如來所說亦無定何曾有一定法可執定說得若以為非法則諸法既無即真實相實相不無又不是非法說是法不得說是非法不得凡一定是法一定非法可取可說者皆屬有為分別菩提之法是清淨真如不假分別無所造作曰無為法惟其無為則無有自體依住處可以取著可以言說不獨如來如是一切賢聖離此別無修證之路差別言法無定相莫從凌獵不可說非法非非法作一句讀無為者以正覺還我自性也從非法非非法看來法本無法無法即法以法為法固非正以無為法不勝岐故有差別正深著以無為法之舛依法出生分第八依法出生正話頭寸心剖出月中秋不思善惡平懷處不負平生海上流此是較量持說此經功德推明此經能出生佛法而不住於佛法以見非他功德可比須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多世尊何以故是福德即非福德性是故如來說福德多若復有人於此經中受持乃至四句偈等為他人說其福勝彼何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出須菩提所謂佛法者即非佛法上文從無相無住無人無法無得無說歸到無為則般若真宗已了然矣菩提一現萬法具足無量福德從此生無邊佛法從此出不可取却是取不盡的不可說却是說不盡的故遂以福德言福德非是有實性之福德所以如影過鏡不礙鏡光如像在空不離空色福德亦何礙于多哉若論真諦之理本無染安有淨本無迷安有悟本無凡安有聖無依無住從此出生佛法一切佛法攝在四句偈中更受之持之為人解說如一燈傳千萬燈其光明震耀不掛一塵比於三千世界純施七寶真實不虗奚啻勝彼福德哉此經從心出而一切法及一切佛皆出此心中峯謂經中凡言四句偈必上有乃至字下有等字言於此經中受持一句二句乃至四句以至十百千句等也一相無相分第九一相無相法中王相中突出氣昂昂輝天鑒地包今古盡在吾人鼻孔藏如來說佛法從此經出此經二字全重在觀照般若上因歷舉四果所證所得所修處逐一徵之空生法眼頓開答個甚大世尊隨又自徵云如來何故說此大身佛所說之大身即是前所說諸相非相之如來身也即是自己所說以無為法之賢聖身也佛說非身是名大身更不煩費一分修證亦不待加一毫擴充須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹此聲聞乘初果也因推入流之故不著一念不入一塵是名入流入逆也謂逆生死流也言逆流則非實有此可逆有彼可入而住之也不入六塵而入聖流總是不取義須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含此聲聞乘二果也彼雖願來一次受生不著往來之相是一往來謂一來欲界從此長往此亦非有往來實住處也須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無不來是故名阿那含此聲聞乘三果也凡情思慮已斷不願來欲界受生亦不著不來之相并無不來處可住須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者此聲聞乘四果也雖三界俱斷一心不生無法可學未嘗作念我是阿羅漢亦非有可住之阿羅漢地若阿羅漢自己作念認著我是阿羅漢此則與衆生知見一般即著四相矣不曰果而曰道者聲聞之道至此圓滿有異於三果也世尊佛說我得無諍三昧人中最為第一是第一離欲阿羅漢世尊我不作是念我是離欲阿羅漢欲界思惑最多塵念欲行我念欲遣猶如水火不相和合謂之諍四果中皆有無字乃無為之法三昧云正受亦名正見念念常正無一邪心得道忘言即是無諍三昧取捨情忘故為離欲阿羅漢世尊我若作是念我得阿羅漢道世尊則不說須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行阿蘭那云無喧雜亦云寂靜行此須菩提自述以考證世尊也阿蘭那即無諍即是清淨行清淨行者謂除去有所得心也無諍而出於三昧則非若世人有心忍耐之無諍故為第一阿羅漢證果實落處全在清淨無為的菩提心而此心元無體相無依住不可取不可說所以親到此地位方知一毫執取不得若才有可舉似執著處便著四相而非四果聖人矣莊嚴淨土分第十莊嚴淨土化人天顯正摧邪總是權權實竝行人借借方知大道本無傳此章是徵明佛菩薩之受記嚴土不可取說結勸諸菩薩無住生心因喻明無相身之大而空生深解也佛告須菩提於意云何如來昔在燃燈佛所於法有所得不不也世尊如來在燃燈佛所於法實無所得此世尊自述以證須菩提也八王子皆師妙光最後成佛者為燃燈乃釋迦受記之師恐人疑有師傳而須菩提已知之深下一實字見從師非無開導指示但以心傳而非以法傳也總之為佛雖有次第禪心只在無著須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴上言法無可得此又借莊嚴以喻之莊嚴世間佛土通修萬行六度此莊嚴自心佛土外貌美觀殊不足尚故云即非徒為虗名故云是名生清淨心是真莊嚴亦以一切功德成就莊嚴也是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心住色即生色心住聲香味觸法即生聲香味觸法心不生所住心自生清淨心夫離相而至生清淨心則住伏不待言矣修行之人只在六根門下應於萬境而不可為萬境所轉單明自己靈心權名為心本無此心故曰而生其心須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛說非身是名大身又借人身以喻之須菩提答言甚大蓋指人心非指人身色身雖大內心量小不名大身內心量大等虗空界方名大身色身縱大如須彌山終不為大非土之土常寂光也非身之身乃法身也身土皆空心境雙絶始是般若極則以顯法身無住之理非身名身者非有漏有為身是無漏無為身清淨身也無為福勝分第十一無為福勝別為文萬法歸源總一門大事門開無可比靈臺竪起鎮巍巍此章是較量持經福德之勝歷舉聲聞佛菩薩俱從無為法中現出許多差別究竟歸於無為所以將恆河喻法身以恆河中沙喻出生之佛法以沙等恆河喻佛法中全體即非佛法受持般若者於心無所生於法無所住是謂無為勝福須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙恆河從阿耨池東西流出周四十里銀沙混流沙細如麵其數無量以一沙成一河如是沙等恆河其多尚可量耶恆河即殑伽河佛近此說法故取為喻福德前已喻較頓說難信故次第說來為漸化衆生令信無上妙義須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人說而此福德勝前福德布施七寶得三界中富貴報講說大乘經典令諸聞者生大智慧成無上道當知受持福德勝前七寶福德約多福以顯勝施感生死竟趨菩提尊重正教分第十二尊重正教在當人遼天拄杖現全身有時放下元無我惟有娘生日逐新此章是申明此經功德之所以勝初明處可敬二明人可尊三明處有佛復次須菩提隨說是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟所在之處如有人說是經念常無念心無得心順衆生心而為說令諸聽者除迷妄心悟得本來佛性常行真實感得天人阿修羅等皆來供養大般若說天帝不在諸天若來但見空座盡皆作禮供養何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處即為有佛若尊重弟子自心誦得此經自心解得此經義自心體得無著無相之理所在之處常修佛行念念無有間歇即是心是佛故言所在之處即為有佛尊重弟子即指文殊普賢諸大菩薩道尊德重也何況二字有二意一是說經之處尚如此而況說經之人一是隨說四句尚如此而況受持全經之人洗心向此經典於有相中悟無相於有說中悟無說自見凡相皆妄離相即佛如法受持分第十三如法受持不用尋三皈三學在中心超然獨步須彌頂大地山河一塊金此章是如來特示經名正是一部經點眼處這般若是上半部經的眼下半部經的根源爾時須菩提白佛言世尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持須菩提已透脫四句妙旨遂求直揭經名得奉持之法世尊但告之曰是經名為金剛般若波羅蜜意謂此法即此心耳奉持者即以此心奉持此法親證菩提必須以無為法要得無為法須具離相離名的智慧眼如是堅固如是猛利全是般若的力用喚作金剛劍亦喚作金剛眼此眼一開則纖塵不留四相俱掃在四果非四果在菩薩非菩薩在佛非佛在法非法還著得一毫修證麼還分得一毫漸次麼所以佛將般若二字與此經安名而又加以金剛二字以見至堅至利不與萬法為侶乃一切俱空一切具足到彼岸之般若也所以者何須菩提佛說般若波羅蜜即非般若波羅蜜是名般若波羅蜜佛既教人離相却立出一個經名殊不知般若即非般若本來無相則名亦非名也般若即是人人清淨心體上一點靈光故又轉一語曰是名般若波羅蜜離一切相即一切法盡大地無有一法是般若存住處亦無有一法不是般若放光處無著云對治恐隨言執故須菩提於意云何如來有所說法不須菩提白佛言世尊如來無所說須菩提知如來說法心無所得故言無所說此方是真能奉持的人無著云第一義不可說須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來說非微塵是名微塵如來說世界非世界是名世界大雲云諸地塵非貪等煩惱塵是無記地塵三千界非煩惱染因界是界為塵因塵不生煩惱施為福因福生煩惱上文說般若即非般若直到一法不立處因甚忽然舉個至多的微塵來發問向這裏得個活路方才不向無所說處坐定空生於大而世界細而微塵尚未有這般廣大心胸差別眼目去包羅得他辨別得他所以呼其名而告之曰這至多的微塵衆生終日在裏許流轉二乘一生向這裏脫離若自如來看來却是當體全空的世界即非世界畢竟喚作甚麼遂曰是名世界不曾作念展拓他亦不曾作念把住他依舊無所說也須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來說三十二相即是非相是名三十二相因推廣世間難說之理以證佛說般若之法微塵該盡宇內人物世界該盡天地終始盡十方世界是自己光明如來說到這裏將如來非身的大身一時邈出然欲執之以見法身何異執微塵以當世界空生當下答個不可以相見如來真是他自己見處三十二相謂眼耳鼻舌身五根中修六波羅蜜是三十意根中修無住無為共三十二觀相元妄無可指陳不妨相即無相故曰即非身相觀相元真塵塵妙覺不妨無相即相故曰是名三十二相即非掃跡也是名本具也須菩提問云何奉持故標名不使其於受持處生執著也須菩提若有善男子善女人以恆河沙等身命布施世間最寶惜者身命如尸毗王之救鴿捨身薩埵之飼虎捨命非施七寶之比然而猶見有身可捨是未知身相之即非身相也猶見布施身命有恆河沙之多是未能布施不住於相也若復有人於此經中乃至受持四句偈等為他人說其福甚多復舉持經功德之大前說七寶今說身命布施更切矣捨身命以救世亦人所至難畢竟無益於性分世尊每說到法無其法說無可說處亟以持經功德示之惟恐人玩易之也已前領悟以下陳情離相寂滅分第十四離相寂滅是虗無無中唱出衆心孚輕輕彈破虗無境千古靈人幾合符空生頓悟如來的大身即是非身自家一向所悟的非身即是如來的大身無為法一時遍滿乾坤自己報身與山河大地當下豁開解到這裏不覺悲感自陳發起下問爾時須菩提聞說是經深解義趣涕淚悲泣而白佛言希有世尊佛說如是甚深經典我從昔來所得慧眼未曾得聞如是之經世尊若復有人得聞是經信心清淨即生實相當知是人成就第一希有功德世尊是實相者即是非相是故如來說名實相世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人即為第一希有何以故此人無我相無人相無衆生相無壽者相所以者何我相即是非相人相衆生相壽者相即是非相何以故離一切諸相即名諸佛空生解後既喜其聞又悲其晚所以喜極而悲如忘忽憶安能禁其涕淚悲泣而白佛言乎歎個希有世尊前贊希有在度生上說此歎希有在說法處說佛說如是甚深經典不惟人空而且法空并般若智相亦空聞如是人法俱空之經而發信心信得此外別無有法此中亦無法相可得便見真實性相逈然獨露頭頭上明物物上顯實相既生法身中具有恆沙性功德自然觸處圓成皆是第一義諦才見有一法可當情便墮影響故急轉一語曰是實相者非有相非無相非非有相非非無相非有無俱相如來前說若見諸相非相則見如來正說此非相乃為實相耳空生說到這裏愈見淨信之難恐末法人信不及欲激勸將來故曰我今得聞是經當佛世而親承佛誨信而不疑解而不惑受而不逆持而不忘不足為難惟當末法無佛之世不能親承佛慈提命但憑文字得聞是甚餘經典而信解受持是則真為第一希有也此信心清淨的人四相俱無為他信心清淨實相即是非相五蘊本來空寂我相即是非相彼此元來絶待人相即是非相萬象一法所印衆生即非衆生億劫不出剎那壽者即非壽者四相所以不煩斷滅而當體全空由是見一切色聞一切聲盡是無為真佛放光現相處不復可以相名之矣相即是佛一切諸相即名諸佛善財入一毛孔過不可說世界見微塵數佛便是此證佛告須菩提如是如是佛印可須菩提所解重言如是深然其言也若復有人得聞是經不驚不怖不畏當知是人甚為希有空生既深解如來便要他實實去行六波羅蜜離相起行便是不思議境界有許多可驚可怖可畏處故將勸行六度先以不驚怖畏發起言是經淨信說到離一切相的田地也大難承當若復有人得聞是經初聞之而言下坦然不作驚異想繼思之而心下帖然不作恐怖想終修持之而荷擔毅然不作畏縮想當知此等人即是最上根器直到彼岸而為希有之人何以故須菩提如來說第一波羅蜜即非第一波羅蜜是名第一波羅蜜此不驚怖畏之人何以便稱希有以此經名為般若六波羅蜜中般若是正因餘五度為助緣如來說般若是第一波羅蜜以法身最大最無上惟般若能成就法身故所以信此般若功德人品俱成第一然此般若無處所可住無照用可尋擬思即錯動念即差盡十方世界求一般若體相不可得盡十方世界求一不是般若行相處亦不可得本無第二何有第一此第一是對餘五波羅蜜言而說六度總一般若以起下忍辱布施一切離相之意波羅稱彼岸於中十種名一布施二持戒三忍辱四精進五禪定六智慧七慈八悲九方便十不退是名十種波羅蜜解空自性名第一波羅蜜須菩提忍辱波羅蜜如來說非忍辱波羅蜜是名忍辱波羅蜜六度中最難離相者無如忍辱一度被人毀害曰辱我能安受曰忍然見有辱可忍即不能忍矣此忍辱原從般若而出本源之心寂然不動遠離分別泯絶能所即忍辱非忍辱所以名為忍辱波羅蜜耳何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解時若有我相人相衆生相壽者相應生嗔恨忍辱實實有此事相何以言非忍辱只為能離四相故如來因引己事明之如來昔為忍辱仙人遇極惡王出遊山中王妃乘王寢來禮仙人王怒問得四果否答不得我常修忍辱道王即割截仙人先斬兩臂次及兩足後及耳鼻四天王瞋怒雨沙礫石王懼懺悔仙言我心無瞋身即平復王乃皈信當是之時如來身被割截而外不見能割之人內不見有所割之我人我中間不見種種差別之衆生一剎那間不見有前後相續之壽者四相不生分別不起何曾見有辱可忍須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相追念歌利王時越今五百世仍入山修道略不涉嗔恨見忍辱非一世也無四相方不亂真性因須菩提離相即佛之語深契佛心世尊遂將自己引證申明相之斷不可有是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心菩薩欲證菩提果者應離一切相發菩提心離相方能發第一心而稱無上離相方能發廣大心而稱正等離相方能發常心而稱正覺要離我人四相先離六塵我人四相由住著六塵而起前文止說布施應離六塵此云發菩提亦要離相發菩提若不離相即使一切色皆佛色一切聲是佛聲而佛見法見猶存菩提亦成法相矣所以離却六塵生無住心方是菩提若心有住即為非住是故佛說菩薩心不應住色布施若心住涅槃非是菩薩住處不住涅槃方是菩薩住處即前說應無所住而生其心也菩薩不為自身而行布施但為內破慳貪心外稱一切衆心而行布施也六塵中色為第一度生中施為第一相見本空智慧元顯本空故人我衆生壽者全彰般若之光元顯則壽者衆生人我總是金剛之體須菩提菩薩為利益一切衆生故應如是布施如來說一切諸相即是非相又說一切衆生即非衆生欲使含靈盡被恩澤豈可自隘其心著我見故見衆生不住色等諸相布施然後自性獲清淨無為功德而衆亦受清淨無為之益須菩提如來是真語者實語者如語者不誑語者不異語者凡小之人一聞此經有不驚之怖之畏之以為是如來之異語誑語乎不知離相發心理原如是如來是真語者離相發心事亦如然如來是實語者離相發心如理如事如來是如語者離相發心惟此是實如來是不誑語者離相發心千聖不易如來是不異語者真即不妄實即不虗順理為如不誑不欺世也不異不怪誕也無非破衆生狐疑之見須菩提如來所得法此法無實無虗須菩提若菩薩心住於法而行布施如人入暗即無所見若菩薩心不住法而行布施如人有目日光明照見種種色無實者以法體空寂無相可得然中有恆沙性德用之不匱故言無虗於一切法心有住著即不了三輪體空如盲處暗若菩薩常行般若波羅蜜多無著無相行如人有目處於皎日之中何所不見一心既等虗空六度俱生實相所謂離一切相則名諸佛也須菩提當來之世若有善男子善女人能於此經受持讀誦即為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德人誠能離相發心則是人成就第一功德亦成就第一矣當來之世善男子善女人能於此離相之經受持讀誦此人智慧弘開不住於法豈獨二乘不能窺測亦且菩薩不能盡之惟有如來以佛光明普照之真智慧方能悉知其存心悉見其行事生心動念忍辱布施無不利益衆生而為功長養菩提而為德由一行以推之萬行由一世以推之百世衆生無邊利益亦無邊菩提無量長養亦無量安有不成就最上第一希有之法者哉持經功德分第十五持經功德養天真化外風光別有因頓悟門開歸萬法一歸何處本來人在在處處言經中有佛全身人當在在尊敬也須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解說佛說末法之時得聞此經信心不逆四相不生即是佛之知見此人功德勝前多劫捨身功德初日分為早晨中日分為日午後日分為晚間一日三時布施功德菩薩一文一義一句一偈莫不從捨身命來又曰觀三千大千世界乃至無有如芥子許不是菩薩捨身命處蓋顯信心難生佛法難聞也信力曰受念力曰持對文曰讀背文曰誦書寫受持讀誦者自行也為人解說者化他也須菩提以要言之是經有不可思議不可稱量無邊功德如來為發大乘者說為發最上乘者說以要言之是言經義殊勝大乘最上乘言人根殊勝受持讀誦述成人殊勝無著云不可思議者惟自覺故不可稱量者無有等及勝故大乘說最上說如斬一握絲一斬一切斷最上者一佛乘也若有人能受持讀誦廣為人說如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等即為荷擔如來阿耨多羅三藐三菩提大乘者智慧廣大善能建立一切法最上乘者無垢法可厭無淨法可求不見衆生可度不見涅槃可證不作度衆生心亦不作不度衆生心是名最上乘亦名一切智亦名無生忍亦名大般若上根之人聞此經典深悟佛意持自心經見自本性究竟復起利他之行能為人解說令諸學者自悟無相之理得見本性如來成無上道了悟經理將如來無上正等正覺以一身負任之背負曰荷在肩曰擔荷擔即前無餘直下擔盡也何以故須菩提若樂小法者著我見人見衆生見壽者見即於此經不能聽受讀誦為人解說彼惟會得大乘最上乘之妙耳若以小乘自限雖不著相猶未忘見便於無相妙理不能契合自己未度豈能化人須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處即為是塔皆應恭敬作禮圍繞以諸華香而散其處若人口誦般若心行般若在在處處常行無為無相之行此人所在之處如有佛塔感得天人供養是人心中自有世尊故云如恐人執忍辱之說徒知捨命捐生而不知修全真性故極言身命布施之不若持經功德因讚般若法身常住能淨業障分第十六能淨業障本來空千差萬別理難窮個中若有江湖客何必今朝又啓蒙此章是言功德不可思議首段是滅罪不可思議次段是證果不可思議第三段是總結不可思議復次須菩提若善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅當得阿耨多羅三藐三菩提前未及世人業報故復次言之夫非欲人堅此持經之念宿世作業應招惡報因持經力止受小挫忍此辱而力加進修當得無上菩提上言經在之處應恭敬供養則持經之人其當尊重可知矣乃善男子善女人受持讀誦此經反為人輕賤者何故豈此經果無驗耶由是人前世罪業應墮三塗惡道以今世持經之故但為人輕賤以償之雖遭輕賤以持般若心不著相罪性本空菩提之體自然明淨先世即是前念妄心今世即是後念覺心圭峯云此明持經轉罪為福修持無我等相即煩惱障盡極惡消滅即業障盡不墮惡道即報障盡三障既滅三德必圓故云當得菩提昔唐太宗注金剛經至輕賤閣筆問一禪師答云此經專摧種子故也太宗當下了然從此下筆沛然無礙蓋現業易消種業難滅每遇善緣多方阻撓類有物以敗之者皆種子為之崇也是以楞嚴神呪亦為專摧種子而設先世有報障今日受持經暫被人輕賤轉重復還輕須菩提我念過去無量阿僧祇劫於燃燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及佛自追思前生歷無數劫阿僧祇華言甚無數又記在師前遇無數佛那由他亦言甚無數如此供養諸佛可謂至多有特出之英持經見本性豈區區敬佛可比數哉供養只是供他佛持經是供自性之佛所以福德霄壤不侔也須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心即狂亂狐疑不信須菩提當知是經義不可思議果報亦不可思議上文屢言功德之多猶是略說若持經者所得功德我若具說彼常人聞之必至驚駭所以然者蓋以此經義趣是無相之旨故其果報非可以言說求也總是形容經典之甚重持經功德之甚大而惓惓期望後人之尊信耳究竟無我分第十七究竟無我絶三玄真空妙理本無傳人人自有黃金相分付東君仔細參菩薩度生無我亦如佛之得菩提無法以申明實無衆生得滅度之義重問發心正從不可思議來爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提若善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩所以者何須菩提實無有法發阿耨多羅三藐三菩提心者復理前問亦有分別初問初皈依者今問證佛果者答言已發心過者只要此心如如非度生則住伏之心亦幾乎息矣有可度之生不起能度之念若四相未除如何住伏其心而名菩薩所以無上正等正覺心原無法可得也彌勒偈云於內心修行存我為菩薩此即障於心違於不住道發菩提心原實無有法所云發心只是性光發露全性起修全修在性空生疑如何住降不知惟無能發之我所發之法然後名真住降也此文意與前同前是破情顯智今是忘智顯理由此賢位漸入聖階須菩提於意云何如來於燃燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所說義佛於燃燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者燃燈佛即不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故燃燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼何以故如來者即諸法如義若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗是故如來說一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法欲引己為證故云於意云何先使其思於然燈佛所正引己證上也法從心生外心無法如是如是讚其言甚當也設有法可傳然燈何必授記後來作佛來世即然燈沒後廣度為釋迦清淨為牟尼是故然燈佛於我授記以見無上菩提心從心自發真性不動曰如如稍加添著即非如義若有人言如來有法得者總凡人言之耳實無有法決言以釋凡人之疑無相無住則無實安住降伏又非虗正見如如之妙一切法即度生布施忍辱類修行成佛借此初入門降怨王請然燈佛入城城中長幼盡迎因路泥善慧布髮佛於此授記自心是佛豈向佛邊求佛實無有法得無上菩提者菩薩離相行六波羅蜜如來要離相人個個解到這裏故將一切諸法生滅垢淨增減種種變異之相皆從衆生顛倒妄想分別而有若人不生分別性相常在畢竟平等本來寂滅何嘗有甚變異此即一切諸法的體性全體如如是即非一切法惟即非一切法是以法法皆同法界而為佛法一切法也須菩提譬如人身長大須菩提言世尊如來說人身長大即為非大身是名大身復以人身譬法之非真有大身非真有則佛法非真有可知前說如須彌山王之大身至此方見實際空生從前悟得的一時現前直答云如來說人身長大非同一切法而和合成身又非外一切法而別自為身彌勒偈云依彼法身佛故說大身喻身離一切障及遍一切境功德及大體故即說大身非身即是身是故說大身非身者無有諸相故大身者有真如體故大身有二義一者遍一切處即法身一者功德大即報身皆離諸相故名為非須菩提菩薩亦如是若作是言我當滅度無量衆生即不名菩薩何以故須菩提實無有法名為菩薩是故佛說一切法無我無人無衆生無壽者彌勒偈云不達真法界起度衆生意及經淨國土生心即是倒菩薩亦如是言菩薩度生不見有度亦如是我當滅度無量衆生是自認普度功德實無有法言修行雖有佛法而法非真性法無其法無我即度我法無人即度人法無衆生即度衆生法無壽者即度一切輪回生死法須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來說莊嚴佛土者即非莊嚴是名莊嚴須菩提若菩薩通達無我法者如來說名真是菩薩無著云人無我法無我再舉佛像言之飾金寶於佛土凡夫之見佛惟清淨自心為莊嚴豈假外飾度無相施無住皆無我法前雖得聞未必能通達此法頭頭是法法法無我是真修行菩薩總之由離相而無我之法行由無我而離相之心化一體同觀分第十八一體同觀共一天白雲明月自相便森羅萬象同根本昔日今時盡是權此章以下正明一切法無我智眼即般若波羅蜜福德相好是修餘五波羅蜜而成說法亦從智波羅蜜而出所謂一切法皆佛法也上明五眼知見之周遍下明五眼見處無一法可得須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼欲言如來照見世人之心先以云何使其思化身觀見為肉眼普照大千為天眼智燭常明為慧眼了諸法空為法眼自性常覺憐念衆生為佛眼佛教除却迷心即五眼開慧眼以根本智照真理故法眼以後得智說法度人在佛總名佛眼古德云天眼通非礙肉眼礙非通法眼難觀俗慧眼了知空佛眼如千日照異體還同須菩提於意云何如恆河中所有沙佛說是沙不如是世尊如來說是沙須菩提於意云何如一恆河中所有沙有如是沙等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊佛說此河中沙一沙況一佛世界佛舉此衆國土者欲明其中所有衆生一一衆生皆有佛心也佛告須菩提爾所國土中所有衆生若干種心如來悉知何以故如來說諸心皆為非心是名為心所以者何須菩提過去心不可得現在心不可得未來心不可得心從無始以來未常變動雖境分三際心無二心故不可得謂三心俱無也人數既多心數益多以如來法眼照之則為染為淨種種差別無數一一悉知此有何法而能悉知如此只因如來慧眼徹見三空衆生心種雖多不出染淨二者此心本來如是所以即此諸心之非心便見一切種心即菩提心千聖相傳以來不曾有一字說得著如來却向一切衆生心皆非心處隨轉一語曰是名為心如向虗空裏釘橛當明星初見時歎一切衆生皆有如來智慧德相但以妄相執著不能證得便是這個消息諸心之所以為非心何也衆生若干種心或追憶過去或執著現在或攀緣未來不出此三種所以要覓心的落處只就三際看皆是虗妄生滅也法界通化分第十九法界通化獨為尊靈山一別至今存人人都具金剛眼聖與凡夫共一塵此章明福德無我衆生心是因福德是果須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實如來不說得福德多以福德無故如來說得福德多即布施一節亦當以無心處之作善因結善緣認福德為實即成有漏之因無心徼福得福反多總之福有者取相也福無者離相也如來說因緣二字點出非心名心之妙空生亦答因緣二字已深領此意但未發明原故所以又呼空生發明之若住相布施以福德為實有違於本來空寂無為之體惟隨緣布施能離於相不見福德為實總之本慈心而與人以樂本悲心而拔人之苦但暢本懷全不住相是無住福德同於虗空無有邊際離色離相分第二十離色離相是無生無之一字強安名有無邪正拈來看句裏呈機自可評此章是明相好無我如來不應以具足身見是發菩提實無有法之義非具足名具足是一切法無我之義須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見何以故如來說具足色身即非具足色身是名具足色身承上法無其法心無其心又番到相無其相佛恐衆生不見法身但見三十二相八十種好以為如來真身不知三十二相即非具足色身內具三十二淨行是名具足色身淨行者即六波羅蜜也於五根中修六波羅蜜於意根中定慧雙修是名具足色身須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來說諸相具足即非具足是名諸相具足如來無法相身由無相故現相即三十二相也如來淨行成佛時具有三十二相始於首之白毫終於足之輪相果可執此以見如來之實相乎然一切法皆佛法三十二相乃佛法之見於相者色身何嘗不是法身具足者無虧缺也諸相者種種變現神通之相也如來以淨行具足三十二相以智慧則具足八萬四千具足三明六通八解脫是以有諸相具足之名非說所說分第二十一非說所說應無方言中有響破天荒水流風動尋常說土塊泥團盡放光此章是說法無我能信法之衆生亦無我六譯至是名說法為一段慧命下秦譯本無唐穆宗時長安僧靈幽入冥誦經無此一段冥王嘆曰貫華之線何斷而不續乎增壽十年令往濠州鍾離寺石壁上摹本增入須菩提汝勿謂如來作是念我當有所說法莫作是念何以故若人言如來有所說法即為謗佛不能解我所說故須菩提說法者無法可說是名說法又承上相無其相番到說無其說言如來有所說是不由心悟徒滋口說即為謗佛不解所說謂不悟真性何由能解故無法可說乃真性難言也況法離一切名相差別本無自體可以容人取說爾時慧命須菩提白佛言世尊頗有衆生於未來世聞說是法生信心不佛言須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來說非衆生是名衆生爾時須菩提智慧圓通以慧為命誠恐末法難信慧命不續因白佛言頗有衆生於未來世聞是經而生正信因其說而悟其無所說直契無我法之菩提法否佛言菩提之法人人有分彼能信的人離言解義逈脫根塵豈是五蘊和合中人非衆生也然而菩提之法本來平等彼能信的人非出五蘊外是非不衆生矣何以故蓋平等法界原無高下不但能信之衆生不可以衆生目之即彼不能信之衆生全身在五蘊內自立主宰是衆生中之衆生無法可得分第二十二無法可得得心空心空境界本圓融固知道本原無說借路還家處處通空生發此問是他深解處所以如來印可之我於阿耨多羅三句是就如來之如上說以見如來無能得法也須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提如來所說相好言說福智等皆無我則菩提亦復無我豈非得而無得者耶空生此問已解到極深處如來要發心人個個向這裏歸根所以即其言而印可之曰如是如是菩提即心自性證得非從外來人謂菩提可得者必菩提本有實法而後可為我得我於阿耨多羅三藐三菩提無有少法可得蓋清淨真如本來空寂一法不立但以妄盡覺滿名曰菩提耳無所得以本來各各具足故衆生以迷為失諸佛以悟為得實於般若體不增一毫故無少法可得無少法可得甚言其無惟不著一毫知證是名無上正等正覺淨心行善分第二十三淨心行善莫辭勞久遠行持道自高得失榮枯非在己清虗境界杖頭挑復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無我無人無衆生無壽者修一切善法即得阿耨多羅三藐三菩提須菩提所言善法者如來說即非善法是名善法上言菩提無法可得豈一切斷滅者耶菩提非一切斷滅而無可得正以一切周遍而無可得復更端告須菩提曰是一真法十界平等隨人分量所至各見一般而此法實無差別總是一真法界清淨遍滿聖不能增凡不能減覺性平等原來如是名為等覺不即不存豈更有上是以名為無上等覺耳惟無有少法則我相不立是法平等則不分我人以此無我無人無衆生無壽者清淨平等不住相之心入在萬行門中順性修為隨緣成辦一毫法相不留一切善法滿足所謂得阿耨多羅三藐三菩提無實無虗者正謂此耳然則如來之得菩提修而無修證而無證豈非得而無得者耶彌勒偈云法界不增減論是法平等是故名無上以之無上上故福智無比分第二十四福智無比破無知竪指擎拳總是癡學海任從他運用吹毛劍下不容絲上半部說不住於相單說個清淨法身是根本智歷舉功德較量十三分遂說出經名十四分因空生深解遂說離相發心行六波羅蜜以至度衆生嚴佛土得菩提福德相好說法俱在修一切善法上說一切法皆佛法而總歸於無我不出通達無我法之五眼可見差別智不在根本智外圓滿法身不在清淨法身外所謂一切佛法皆從此經出以見此經功德之大故又重將功德較量仍點出般若經名以見無上菩提不出般若此經之外須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人說於前福德百分不及一百千萬億分乃至算數譬喻所不能及將功德較量點出般若經名以見徹始徹終更無二理即因即果更無二時無上菩提總不出此般若經名此外別無善法因呼空生而告之曰一四天下有須彌山王三千大千世界則有億萬須彌山王矣以此至高至廣之七寶持用布施豈非善法中之至大至廣乎然而善法不從般若出則有漏功德也善法若從般若出則全海一漚也若人以此般若受持四句為他人說則無少法之清淨法身無高下之平等法身豈布施福德可及哉彌勒偈云雖言無記法而說是彼因是故一法寶勝無量珍寶大鐵圍山高廣二百二十四萬里小鐵圍山高廣十二萬里須彌山高三十六萬里以此名為三千大千世界化無所化分第二十五化無所化道人家古往今來更不差三昧辨才徒指示別生一見又拈華說度而無度在菩提得而無得之後他人見如來度生有種種護念付囑一一見之實事亦可言無滅度乎為遣此疑故說雖有種種度生之法而如來無我則法本無法凡夫為凡夫則度而無度方了實無滅度之案須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念何以故實無有衆生如來度者若有衆生如來度者如來即有我人衆生壽者須菩提如來說有我者即非有我而凡夫之人以為有我須菩提凡夫者如來說即非凡夫是名凡夫般若智圓自然衆生見盡是名度衆生若離受持般若外別欲度衆生則滯四相矣此復申明度生無相之旨修得真空般若便為度生苟離般若度生是凡夫之以我為我而未能通達無我法總是著相即妄離相即佛上文言以無我修善法則菩提得而無得至於度生如來現無邊身說無量法實實以同體大悲不於自己心外見有衆生如來自性自度不於衆生心中見有生死衆生本自涅槃安有衆生如來度者即此取相凡夫如來以佛眼看來法從緣生了無可得凡夫全體是佛暫現凡夫之相說名凡夫耳如來無我誰度衆生凡夫即非凡夫有何衆生可度法身非相分第二十六法身非相露真常野鳥山華共一光本地家風非外得不勞彈指到家鄉須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛告須菩提若以三十二相觀如來者轉輪聖王即是如來須菩提白佛言世尊如我解佛所說義不應以三十二相觀如來爾時世尊而說偈言若以色見我以音聲求我是人行邪道不能見如來前言諸相具足即非具足是名具足是相好從無相中現出好相原不離法身也然則觀佛者見法身之好相便可以悟無相之法身矣但觀字與見字有別以相見佛是以相觀佛也以相觀佛則以相雖非佛而因此有相以觀無相之妙須菩提曰如是如是由無相觀相見相便知無相如見烟知火蓋已真見非相之實相則見諸相即非相故曰若以三十二相見如來則轉輪聖王亦具三十二相循聲逐色流轉妄識名為邪道安可執此以見正等正覺之如來哉轉輪聖王管四天下人壽萬歲時出世七寶自至輪寶象寶馬寶女寶如意珠寶主兵臣寶主藏臣寶常隨其身遍照南閻浮提西瞿耶尼北𣠵單越東弗婆提常如輪之轉運故曰轉輪王以德化民故曰聖王以福業多具三十二相輪王有四一金輪二銀輪三銅輪四鐵輪無斷無滅分第二十七無斷無滅本來無看破塵勞遍界敷即境即心無二法猶如明月映江湖恐人疑修福因則得相果不得菩提修菩提因則得菩提失却福德故又以斷滅破之須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提心者說諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不說斷滅相佛正教人離相不教人毀相只怕人著相非教人滅相前以離相無我顯般若空相不墮常見今以即相修因顯般若實相不墮斷見汝若作是念與莫作是念反覆開喻俱叮嚀之意不以具足相得菩提是無上菩提之真性非外相可得也然離身相而得菩提猶有斷滅相惟於法不說斷滅相寂而常用用而常寂總見離相最要又不可有意離相不受不貪分第二十八不受不貪守自然黃虀淡飯且隨緣無榮無辱家常事一種平懷一種玄上言不宜斷相以修菩提此言得菩提亦不失福德須菩提若菩薩以滿恆河沙等世界七寶持用布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得福德何以故須菩提以諸菩薩不受福德故須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故說不受福德前以持經者較今以得法者較無非形容佛法之妙從前說法只無我盡之木知成功在忍今智理俱融人法兩空得成於忍入大乘境界所以勝之諸菩薩非單頂布施云何者福所必得云何不受菩薩所作福德止為利益衆生故不受福德心無望報受猶不受也菩薩不受福德是作而不受抑不作不受不知菩薩所作福德無自己受用想雖受而不貪著總為利益衆生非是說斷滅相不修諸度也無生法忍者言人本具之性湛然常住原無有生亦無有滅故名無生此一點不斷不滅之靈光惟獨自了不能說以示人強名曰忍而已到此境界其福德因果豈布施可及又豈同凡夫之貪著耶忍有印可意從受此經而入忍有安定意從持此經而入王匡石曰大般若有安受忍觀察忍修此二忍便得成無生法忍忍力成自得無生樂故云得成威儀寂靜分第二十九威儀寂靜絶三玄塵塵分開水底天飛錫杖頭懸日月一毛孔內納三千此章是掃去應身不定之迹指出如來常寂法身以示人須菩提若有人言如來若來若去若坐若臥是人不解我所說義何以故如來者無所從來亦無所去故名如來上言不可以相觀如來不住於有次言其不說斷滅如來不住於無然不能於法身上洞徹一源豈能解我所說義哉所謂如來者不以應化為身以法性為身盡法界是一如如不動之體本無去來其來也衆生心淨緣至即現其去也衆生心垢感畢即隱譬如水清月現月亦不來水濁月隱月亦非去是知法身真佛體絶去來以不來故離一切法以不去故即一切法若顯現而成四威儀不過為化度衆生現出之迹像豈所以言如來哉一合理相分第三十一合理相原無二冤親平等道方圓是邪是正體分別蕩蕩無拘樂自然破一合則破分別不言而喻須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不須菩提言甚多世尊何以故若是微塵衆實有者佛即不說是微塵衆所以者何佛說微塵衆即非微塵衆是名微塵衆佛說三千大千世界以喻一一衆生性上微塵之數如三千大千世界中所有微塵一切衆生聞經悟道覺慧常照趣向菩提念念不住常在清淨如是清淨微塵是名微塵衆聚塵為界破界為塵原無實體如有實體便可實說應現十方故非一同依一體故非異世尊如來所說三千大千世界即非世界是名世界何以故若世界實有者即是一合相如來說一合相即非一合相是名一合相須菩提一合相者即是不可說但凡夫之人貪著其事如來法身無來無去猶合三千大千以成一界如來法身現而為應身有來有去猶碎三千大千以為微塵也如來設此一問雖問微塵之多而意顯界塵之無實性如來說一合相正以第一義言一真法界平等圓融非色相可以摶聚非心思可以湊泊法身之與應身無後無先非因非果有時拈一塵而全界宛然有時現千界而一塵不立一即一切一切即一誰為能合誰為所合而成一合相耶止為凡夫在事相上取著見謂一切萬法由分而合由多而一執見五蘊取其和合是貪著事五蘊和合無實體總之界歸於塵無界可取塵歸於識無塵可取四蘊離念無心可取衆生取著皆由虗妄分別見五蘊不了法空是法執取和合不達諸法即我執二執不忘故名貪著其事無著云為破色身故說塵界等於中細末方便及無所見方便塵甚多者是細末方便佛意以界喻真身塵喻化身如來寧說碎為微塵不說合為世界才說一早落二三才說個合便成差別知見不生分第三十一知見不生雲遮月忽聞風掃現團圓普天匝地光明朗照破三千及大千此章是示以知見無見之佛知見而囑菩薩之住於正見也須菩提若人言佛說我見人見衆生見壽者見須菩提於意云何是人解我所說義不不也世尊是人不解如來所說義何以故世尊說我見人見衆生見壽者見即非我見人見衆生見壽者見是名我見人見衆生見壽者見如來說一切衆生皆有佛性是真我見說一切衆生無漏智性本自具足是人見說一切衆生本無煩惱是名衆生見說一切衆生性本不生不滅是名壽者見須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來說即非法相是名法相於一切法應如經中所言如是知而明理如是見而識別如是信心解悟如是便不生法相矣法到悟時法便不用尚有法相乎故曰即非曰是名言不生法相者不於法取著也如來所說是掃衆生之見而空之非標自己之見而立之也若衆生無此見則如來亦無此說矣總之分別不起諸相何自而生不獨無我相亦無法相并非法相亦無而無無之見亦無矣如是知見信解正所謂如是降伏如是安住也應化非真分第三十二應化非真包古今隨緣應世本無心靈機一脉威音外無口先生晝夜吟凡言持受必兼言為他人說受持之法經中說已詳盡演說之法未曾闡明所以於經末示之是付囑處須菩提若有人以滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩提心者持於此經乃至四句偈等受持讀誦為人演說其福勝彼云何為人演說不取於相如如不動七寶之福雖多不如有人發菩提心受持此經四句為人演說其福勝彼說法善巧方便觀根應量種種隨宜是名為人演說所聽法人有種種相貌不等不得作分別之心但了空寂如如之心無所得心無取捨勝負心無希望心無生滅心是名如如不動心也無著云為說法不染故以有如是大利故決定演說如是演說即無所染何以故佛宜常住世間為衆生說法何故入涅槃耶恐人生疑故下釋偈一切有為法如夢幻泡影如露亦如電應作如是觀說經之終復提醒四句偈等總是萬法歸空正申結諸相非相意曰不取於相總結相皆虗妄以了離相即佛義曰如如不動總結無所住心以了應住降伏義又以一切法作六種觀觀此透徹自然空視一切此中渾是一個阿耨多羅三藐三菩提心何弗安住何待降伏哉觀即般若妙智能觀既是妙智所觀無非妙境如是觀乃了化身即法身法身不礙涅槃也如夢如幻如泡如影如露如電悟心之人稱性而起無作自成隨緣而生緣過即寂何常有纖毫實法可容人住著悟真空則不住相觀生滅則警策修行佛說是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所說皆大歡喜信受奉行此在祇園說經已畢一切世間天神世人與鬼神中之凶類誰不輪回苦海欣然回頭向佛佛法感人如此記者記經已畢每說皆大歡喜信受奉行蓋信受而不奉行并信受亦虗即歡喜何益世之持經者宜於此處力加猛省金剛般若波羅蜜經竟
